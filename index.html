<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>Farol — assistente pessoal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#101418;
  --panel:#181e24;
  --panel-2:#1f2730;
  --line:#2a333d;
  --ink:#eef2f5;
  --ink-dim:#8fa0ae;
  --ocean:#4fb3c4;      /* finanças */
  --leaf:#8fc177;       /* refeições */
  --clay:#e08a5e;       /* agenda */
  --sun:#e6c15a;        /* tarefas */
  --user-bubble:#2b3a46;
  --radius:14px;
  font-size:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  display:flex;flex-direction:column;
  max-width:680px;margin:0 auto;
  height:100vh;height:100dvh;overflow:hidden;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}
header{
  padding:14px 18px 10px;
  display:flex;align-items:baseline;gap:10px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
header h1{font-family:'Sora',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:.02em}
header h1 span{color:var(--ocean)}
header .date{color:var(--ink-dim);font-size:.78rem;margin-left:auto}

main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 8px;overscroll-behavior:contain}
/* iOS dá zoom automático em campos com fonte <16px — força 16px em telas de toque */
@media (pointer:coarse){
  #composer textarea, .set-field input, .set-field select, .sheet input, .sheet select{font-size:16px !important}
}
.view{display:none}
.view.active{display:block}

/* ---------- CHAT ---------- */
#chatLog{display:flex;flex-direction:column;gap:12px;padding-bottom:8px}
.msg{max-width:86%;padding:10px 14px;border-radius:var(--radius);line-height:1.45;font-size:.92rem;white-space:pre-wrap;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--user-bubble);border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg img{max-width:100%;border-radius:10px;display:block;margin-bottom:6px}
.msg.typing{color:var(--ink-dim);font-style:italic}

.card{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--ink-dim);border-radius:var(--radius);padding:12px 14px;max-width:86%;font-size:.88rem}
.card.meal{border-left-color:var(--leaf)}
.card.finance{border-left-color:var(--ocean)}
.card.event{border-left-color:var(--clay)}
.card.task{border-left-color:var(--sun)}
.card .card-tag{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);margin-bottom:4px;font-family:'Sora',sans-serif}
.card .card-title{font-weight:600;margin-bottom:6px}
.card .macro-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.card .macro-row div{font-size:.8rem;color:var(--ink-dim)}
.card .macro-row b{color:var(--ink);font-weight:600}
.card ul{list-style:none;margin-top:4px}
.card ul li{font-size:.82rem;color:var(--ink-dim);padding:2px 0}
.card .amount{font-family:'Sora',sans-serif;font-size:1.05rem;font-weight:600}
.card .amount.pos{color:var(--leaf)}
.card .amount.neg{color:var(--clay)}

/* welcome */
.welcome{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;font-size:.9rem;line-height:1.55}
.welcome b{font-family:'Sora',sans-serif}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.chip{background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:.8rem;cursor:pointer;color:var(--ink-dim)}
.chip:active{background:var(--line)}

/* ---------- composer ---------- */
#composer{
  flex-shrink:0;display:flex;gap:8px;align-items:flex-end;
  padding:10px 12px;border-top:1px solid var(--line);background:var(--bg);
}
#composer textarea{
  flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  border-radius:22px;padding:11px 16px;font-family:inherit;font-size:.95rem;
  resize:none;max-height:120px;outline:none;line-height:1.4;
}
#composer textarea:focus{border-color:var(--ocean)}
.icon-btn{
  width:44px;height:44px;border-radius:50%;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.icon-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#sendBtn{background:var(--ocean);border-color:var(--ocean);color:#0c1215}
#sendBtn:disabled{opacity:.4}
#photoPreview{display:none;padding:8px 14px;border-top:1px solid var(--line);font-size:.8rem;color:var(--ink-dim);align-items:center;gap:10px}
#photoPreview img{height:44px;border-radius:8px}
#photoPreview button{background:none;border:none;color:var(--clay);cursor:pointer;font-size:.8rem}

/* ---------- nav ---------- */
nav{
  flex-shrink:0;display:flex;border-top:1px solid var(--line);background:var(--panel);
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1;background:none;border:none;color:var(--ink-dim);cursor:pointer;
  padding:9px 0 7px;font-size:.62rem;font-family:'Sora',sans-serif;letter-spacing:.03em;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.active{color:var(--ink)}
nav button[data-view=meals].active{color:var(--leaf)}
nav button[data-view=finance].active{color:var(--ocean)}
nav button[data-view=agenda].active{color:var(--clay)}
nav button[data-view=tasks].active{color:var(--sun)}

/* ---------- shared view bits ---------- */
.view h2{font-family:'Sora',sans-serif;font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center}
.stat .v{font-family:'Sora',sans-serif;font-weight:600;font-size:.98rem}
.stat .l{font-size:.64rem;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.list-item{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px;font-size:.88rem}
.list-item .sub{color:var(--ink-dim);font-size:.78rem;margin-top:2px}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.empty{color:var(--ink-dim);font-size:.85rem;text-align:center;padding:30px 10px}
.pager{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pager button{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;width:34px;height:34px;cursor:pointer;font-size:1rem}
.pager .label{font-family:'Sora',sans-serif;font-size:.9rem}
.bar-row{margin-bottom:10px}
.bar-row .row{font-size:.82rem;margin-bottom:4px}
.bar-track{height:7px;background:var(--panel-2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--ocean);border-radius:4px}
.section-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);margin:16px 0 8px;font-family:'Sora',sans-serif}
.task-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--ink-dim);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent}
.task-check.done{background:var(--sun);border-color:var(--sun);color:#0c1215}
.task-done .t{text-decoration:line-through;color:var(--ink-dim)}
.del-btn{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:.9rem;padding:4px}
.storage-warn{background:#3a2b20;border:1px solid #5a4230;border-radius:10px;padding:10px 12px;font-size:.78rem;color:#e0b98a;margin-bottom:12px;display:none}

/* ---------- HOME DASHBOARD ---------- */
.greet{font-family:'Sora',sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:2px}
.greet-sub{color:var(--ink-dim);font-size:.82rem;margin-bottom:16px}
.home-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:12px;cursor:pointer;position:relative;
  border-left:3px solid var(--ink-dim);
}
.home-card:active{background:var(--panel-2)}
.home-card.hc-meals{border-left-color:var(--leaf)}
.home-card.hc-finance{border-left-color:var(--ocean)}
.home-card.hc-agenda{border-left-color:var(--clay)}
.home-card.hc-tasks{border-left-color:var(--sun)}
.home-card .hc-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.home-card .hc-title{font-family:'Sora',sans-serif;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim)}
.home-card .hc-link{font-size:.72rem;color:var(--ink-dim)}
.home-card .hc-big{font-family:'Sora',sans-serif;font-size:1.35rem;font-weight:700}
.home-card .hc-big small{font-size:.75rem;font-weight:500;color:var(--ink-dim)}
.hc-macros{display:flex;gap:14px;margin-top:6px;font-size:.78rem;color:var(--ink-dim)}
.hc-macros b{color:var(--ink)}
.hc-fin-row{display:flex;gap:8px;margin-top:8px}
.hc-fin-row .mini{flex:1;background:var(--panel-2);border-radius:10px;padding:8px;text-align:center}
.hc-fin-row .mini .v{font-family:'Sora',sans-serif;font-weight:600;font-size:.85rem}
.hc-fin-row .mini .l{font-size:.62rem;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.05em}
.hc-line{display:flex;gap:10px;align-items:baseline;padding:6px 0;font-size:.86rem;border-top:1px solid var(--line)}
.hc-line:first-of-type{border-top:none}
.hc-line .when{color:var(--ink-dim);font-size:.75rem;min-width:74px;font-family:'Sora',sans-serif}
.hc-empty{color:var(--ink-dim);font-size:.82rem;padding:4px 0}
.hc-badge{background:var(--panel-2);border-radius:20px;padding:2px 10px;font-size:.72rem;color:var(--ink-dim)}
.home-cta{
  width:100%;background:var(--ocean);color:#0c1215;border:none;border-radius:var(--radius);
  padding:13px;font-family:'Sora',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;
  margin:4px 0 16px;display:flex;align-items:center;justify-content:center;gap:8px;
}
.home-cta svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ---------- QUICK ACTIONS / BRIEFING / METAS ---------- */
.quick-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.quick-btn{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 4px;cursor:pointer;color:var(--ink);font-family:'Sora',sans-serif;font-size:.68rem;display:flex;flex-direction:column;align-items:center;gap:4px}
.quick-btn span{font-size:1.15rem}
.quick-btn:active{background:var(--panel-2)}
.briefing{background:linear-gradient(135deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px;font-size:.87rem;line-height:1.55;white-space:pre-wrap}
.briefing .hc-head{margin-bottom:8px}
.briefing .refresh{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:.72rem}
.goal-row{margin-top:8px}
.goal-row .row{font-size:.74rem;color:var(--ink-dim);margin-bottom:3px}
.goal-row b{color:var(--ink)}
.goal-track{height:6px;background:var(--panel-2);border-radius:4px;overflow:hidden}
.goal-fill{height:100%;border-radius:4px;background:var(--leaf)}
.goal-fill.warn{background:var(--sun)}
.goal-fill.over{background:var(--clay)}
.budget-alert{margin-top:8px;font-size:.76rem;color:var(--sun)}
.budget-alert.over{color:var(--clay)}

/* ---------- NEGÓCIOS ---------- */
.biz-row{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:8px}
.biz-row .row{font-size:.86rem}
.biz-row .sub{display:flex;gap:14px;margin-top:4px;font-size:.75rem;color:var(--ink-dim)}
.biz-result{font-family:'Sora',sans-serif;font-weight:600}

/* ---------- AJUSTES ---------- */
.set-group{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.set-group h3{font-family:'Sora',sans-serif;font-size:.82rem;margin-bottom:10px}
.set-field{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;font-size:.84rem}
.set-field label{color:var(--ink-dim)}
.set-field input{width:110px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:.85rem;text-align:right;outline:none}
.set-field input:focus{border-color:var(--ocean)}
.set-field input.wide{width:100%;text-align:left}
.set-col{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.set-col label{color:var(--ink-dim);font-size:.8rem}
.btn{background:var(--ocean);color:#0c1215;border:none;border-radius:10px;padding:10px 16px;font-family:'Sora',sans-serif;font-weight:600;font-size:.82rem;cursor:pointer}
.btn.ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.sync-status{font-size:.76rem;color:var(--ink-dim);margin-top:8px}
.set-group details{font-size:.76rem;color:var(--ink-dim);margin-top:10px}
.set-group pre{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:8px;font-size:.68rem;overflow-x:auto;color:var(--ink)}
.gear-btn{background:none;border:none;color:var(--ink-dim);cursor:pointer;padding:4px;margin-left:10px}
.gear-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ---------- UX: transições / agora / toast / edição / slash ---------- */
.view.active{animation:viewIn .18s ease-out}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){.view.active{animation:none}}

.now-card{
  background:linear-gradient(135deg,#2b1f18,#3a2a1e);border:1px solid #5a4230;
  border-radius:var(--radius);padding:14px;margin-bottom:14px;cursor:pointer;
}
.now-card .hc-title{color:var(--clay)}
.now-card .now-when{font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:700;color:var(--clay)}
.now-card .now-title{font-size:.95rem;margin-top:2px}
.now-card .now-sub{color:var(--ink-dim);font-size:.78rem;margin-top:2px}

#toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(20px);
  bottom:calc(64px + env(safe-area-inset-bottom));z-index:60;
  background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
  padding:11px 16px;font-size:.84rem;display:flex;gap:14px;align-items:center;
  box-shadow:0 8px 24px rgba(0,0,0,.45);opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;max-width:90vw;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
#toast button{background:none;border:none;color:var(--ocean);font-family:'Sora',sans-serif;font-weight:600;font-size:.82rem;cursor:pointer}
.undo-link{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:.72rem;margin-top:8px;padding:0;text-decoration:underline}
.card.undone{opacity:.45}

#modalOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:70;
  display:none;align-items:flex-end;justify-content:center;
}
#modalOverlay.open{display:flex}
.sheet{
  background:var(--panel);border:1px solid var(--line);border-bottom:none;
  border-radius:18px 18px 0 0;width:100%;max-width:680px;
  padding:18px 16px calc(18px + env(safe-area-inset-bottom));
  animation:sheetUp .22s ease-out;max-height:80dvh;overflow-y:auto;
}
@keyframes sheetUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheet h3{font-family:'Sora',sans-serif;font-size:.95rem;margin-bottom:14px}
.sheet .set-field input,.sheet .set-field select{
  width:170px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:8px 10px;font-family:inherit;font-size:.85rem;outline:none;
}
.sheet .set-field select{text-align:left}
.sheet .set-field input:focus,.sheet .set-field select:focus{border-color:var(--ocean)}

#slashMenu{
  position:absolute;bottom:100%;left:10px;right:10px;margin-bottom:6px;
  background:var(--panel);border:1px solid var(--line);border-radius:14px;
  box-shadow:0 -6px 24px rgba(0,0,0,.4);overflow:hidden;display:none;z-index:50;
}
#slashMenu.open{display:block}
#slashMenu button{
  display:flex;width:100%;background:none;border:none;color:var(--ink);
  padding:11px 16px;font-size:.86rem;cursor:pointer;gap:10px;align-items:center;
  border-bottom:1px solid var(--line);font-family:inherit;text-align:left;
}
#slashMenu button:last-child{border-bottom:none}
#slashMenu button:active{background:var(--panel-2)}
#slashMenu .hint{color:var(--ink-dim);font-size:.72rem;margin-left:auto}
</style>
</head>
<body>

<header>
  <h1>Farol<span>.</span></h1>
  <div class="date" id="headerDate"></div>
  <button class="gear-btn" onclick="showView('settings')" title="Ajustes">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</header>

<main id="main">
  <div id="storageWarn" class="storage-warn">Armazenamento persistente indisponível — os dados vivem só nesta sessão.</div>

  <!-- HOME -->
  <section class="view active" id="view-home">
    <div class="greet" id="homeGreet"></div>
    <div class="greet-sub" id="homeGreetSub"></div>
    <button class="home-cta" onclick="showView('chat');document.getElementById('input').focus()">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Falar com o Farol
    </button>
    <div class="quick-row">
      <button class="quick-btn" onclick="quickAction('photo')"><span>📸</span>Foto do prato</button>
      <button class="quick-btn" onclick="quickAction('gasto')"><span>💸</span>Gasto</button>
      <button class="quick-btn" onclick="quickAction('tarefa')"><span>✓</span>Tarefa</button>
    </div>
    <div id="briefingBox"></div>
    <div id="homeCards"></div>
  </section>

  <!-- CHAT -->
  <section class="view" id="view-chat">
    <div id="chatLog"></div>
  </section>

  <!-- MEALS -->
  <section class="view" id="view-meals">
    <h2><span class="dot" style="background:var(--leaf)"></span>Refeições</h2>
    <div class="pager">
      <button onclick="shiftMealDay(-1)">‹</button>
      <div class="label" id="mealDayLabel"></div>
      <button onclick="shiftMealDay(1)">›</button>
    </div>
    <div class="stats" id="mealStats"></div>
    <div id="mealList"></div>
  </section>

  <!-- FINANCE -->
  <section class="view" id="view-finance">
    <h2><span class="dot" style="background:var(--ocean)"></span>Finanças</h2>
    <div class="pager">
      <button onclick="shiftFinMonth(-1)">‹</button>
      <div class="label" id="finMonthLabel"></div>
      <button onclick="shiftFinMonth(1)">›</button>
    </div>
    <div class="stats" style="grid-template-columns:repeat(3,1fr)" id="finStats"></div>
    <div class="section-label">Por negócio</div>
    <div id="finBiz"></div>

<script>
/* ================= STATE & STORAGE ================= */
const S = { meals: [], finances: [], tasks: [], events: [], history: [], settings: null };
const DEFAULT_SETTINGS = {
  goals: { kcal: null, protein: null, carbs: null, fat: null },
  budgets: {},
  briefing: { date: null, text: '' },
  supabase: { url: '', key: '' }
};
const EXP_CATS = ['Alimentação','Mercado','Transporte','Moradia','Saúde','Lazer','Imóveis/Airbnb','Flores do Sol','DJ','Trabalho','Outros'];
const BIZ = ['Pessoal','Airbnb QS39','Airbnb QS40','Airbnb QS50','Flores do Sol','DJ CLAU','Engenharia'];
let storageOK = true;
let pendingPhoto = null; // {data, mediaType, url}
let mealDay = todayStr();
let finMonth = todayStr().slice(0, 7);

function todayStr(d = new Date()) {
  const off = d.getTimezoneOffset() * 60000;
  return new Date(d - off).toISOString().slice(0, 10);
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function fmtBR(n) { return 'R$ ' + Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtDate(s) {
  const [y, m, d] = s.split('-');
  return `${d}/${m}`;
}
const WEEK = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
const MONTHS = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

async function loadState() {
  if (!window.storage) { storageOK = false; }
  else {
    let loaded = false;
    try {
      const r = await window.storage.get('farol_data');
      if (r && r.value) {
        const d = JSON.parse(r.value);
        ['meals', 'finances', 'tasks', 'events', 'history', 'settings'].forEach(k => { if (d[k] != null) S[k] = d[k]; });
        loaded = true;
      }
    } catch (e) { /* chave nova ainda não existe */ }
    if (!loaded) {
      // migração do formato antigo (uma chave por coleção)
      for (const key of ['meals', 'finances', 'tasks', 'events', 'history', 'settings']) {
        try {
          const r = await window.storage.get('farol:' + key);
          if (r && r.value) { S[key] = JSON.parse(r.value); loaded = true; }
        } catch (e) { /* não existe */ }
      }
    }
  }
  S.settings = Object.assign({}, DEFAULT_SETTINGS, S.settings || {});
  S.settings.goals = Object.assign({}, DEFAULT_SETTINGS.goals, S.settings.goals);
  S.settings.budgets = S.settings.budgets || {};
  S.settings.briefing = Object.assign({}, DEFAULT_SETTINGS.briefing, S.settings.briefing);
  S.settings.supabase = Object.assign({}, DEFAULT_SETTINGS.supabase, S.settings.supabase);
}

/* gravação agrupada: várias mudanças seguidas = uma única escrita */
let saveTimer2 = null;
function saveState(key) {
  if (key !== 'history') scheduleSync();
  if (!storageOK || !window.storage) return;
  clearTimeout(saveTimer2);
  saveTimer2 = setTimeout(() => persistAll(0), 800);
}
async function persistAll(attempt) {
  if (!storageOK || !window.storage) return;
  const payload = JSON.stringify({
    meals: S.meals, finances: S.finances, tasks: S.tasks,
    events: S.events, history: S.history, settings: S.settings
  });
  try {
    await window.storage.set('farol_data', payload);
  } catch (e) {
    if (attempt < 3) {
      setTimeout(() => persistAll(attempt + 1), 1500 * (attempt + 1));
    } else {
      console.error('persist fail', e);
      toast('Falha ao salvar — vou tentar de novo em instantes');
      setTimeout(() => persistAll(0), 12000);
    }
  }
}

/* ---------- swipe entre abas ---------- */
(function () {

/* ---------- menu "/" ---------- */
const SLASH_CMDS = [
  ['💸', 'Registrar gasto', 'gastei '],
  ['💰', 'Registrar receita', 'recebi '],
  ['🥗', 'Registrar refeição', 'comi '],

function renderSlashMenu() {
  const menu = document.getElementById('slashMenu');
  const q = input.value;
  if (!q.startsWith('/')) { menu.classList.remove('open'); return; }
  const filter = q.slice(1).toLowerCase();
  const items = SLASH_CMDS.filter(c => !filter || c[1].toLowerCase().includes(filter));
  if (!items.length) { menu.classList.remove('open'); return; }
  menu.innerHTML = items.map((c, i) =>
    `<button onclick="pickSlash(${SLASH_CMDS.indexOf(c)})"><span>${c[0]}</span>${c[1]}<span class="hint">${c[2] === null ? 'câmera' : c[2].endsWith(' ') ? 'preenche' : 'envia'}</span></button>`
  ).join('');
  menu.classList.add('open');
}
function pickSlash(i) {
  const [, , tmpl] = SLASH_CMDS[i];
  closeSlash();
  if (tmpl === null) { input.value = ''; document.getElementById('photoInput').click(); return; }
  input.value = tmpl;
  if (!tmpl.endsWith(' ')) { send(); return; }

/* ================= AI ================= */
function dataSummary() {
  const today = todayStr();
  const month = today.slice(0, 7);
  const mealsToday = S.meals.filter(m => m.date === today);
  const finMonthEntries = S.finances.filter(f => f.date && f.date.startsWith(month));
  return {
    hoje: today,
    refeicoes_hoje: mealsToday.map(m => ({ id: m.id, titulo: m.title, kcal: m.kcal, proteina_g: m.protein_g, carbo_g: m.carbs_g, gordura_g: m.fat_g })),
    totais_hoje: mealsToday.reduce((a, m) => ({ kcal: a.kcal + (m.kcal||0), p: a.p + (m.protein_g||0), c: a.c + (m.carbs_g||0), g: a.g + (m.fat_g||0) }), {kcal:0,p:0,c:0,g:0}),
    financas_mes_atual: finMonthEntries.map(f => ({ id: f.id, tipo: f.kind, desc: f.desc, valor: f.amount, categoria: f.category, negocio: f.business || 'Pessoal', data: f.date })),
    financas_meses_anteriores_resumo: resumoMesesAnteriores(),
    tarefas: S.tasks.map(t => ({ id: t.id, titulo: t.title, prazo: t.due, feita: !!t.done })),
    eventos: S.events.filter(e => e.date >= today).map(e => ({ id: e.id, titulo: e.title, data: e.date, hora: e.time, local: e.location })),
    metas_macros_diarias: S.settings.goals,
    orcamentos_mensais_por_categoria: S.settings.budgets
  };
}
function resumoMesesAnteriores() {
  const month = todayStr().slice(0, 7);
  const out = {};
  S.finances.forEach(f => {
    if (!f.date || f.date.startsWith(month)) return;
    const m = f.date.slice(0, 7);
    out[m] = out[m] || { despesas: 0, receitas: 0 };
    if (f.kind === 'receita') out[m].receitas += f.amount; else out[m].despesas += f.amount;
  });
  return out;
}

function systemPrompt() {
  const d = new Date();
  return `Você é o Farol, assistente pessoal do Claudio (Pipa/RN, Brasil). Hoje é ${WEEK[d.getDay()]}, ${todayStr()}.

Sua ÚNICA saída é um JSON válido, sem markdown, sem texto fora do JSON:
{"reply":"resposta curta e natural em português","actions":[]}

Ações possíveis dentro de "actions":
1. {"type":"add_meal","meal":{"title":"Almoço","meal_type":"cafe|almoco|jantar|lanche","date":"YYYY-MM-DD","items":[{"name":"arroz branco","qty":"150 g","kcal":195,"protein_g":4,"carbs_g":42,"fat_g":0.4}],"kcal":0,"protein_g":0,"carbs_g":0,"fat_g":0}}
   (kcal e macros do topo = soma dos itens; estime porções com bom senso)
2. {"type":"add_finance","entry":{"kind":"despesa|receita","desc":"...","amount":123.45,"category":"...","business":"...","date":"YYYY-MM-DD"}}
   Categorias de despesa: ${EXP_CATS.join(', ')}.
   Categorias de receita: Engenharia, Airbnb, DJ, Flores do Sol, Outros.
   "business" (a qual negócio pertence): ${BIZ.join(', ')}. Inferir pelo contexto: gastos/receitas das casas de aluguel → Airbnb da casa citada (Frida=QS39, Azul=QS40, Terracota=QS50; se não citar a casa, use "Airbnb QS39" e avise no reply que assumiu). Cerâmica/artesanato/impressão 3D → Flores do Sol. Eventos/discotecagem/equipamento de som → DJ CLAU. RITUR/projetos/consultorias técnicas → Engenharia. Todo o resto → Pessoal.
3. {"type":"add_task","task":{"title":"...","due":"YYYY-MM-DD ou null"}}
4. {"type":"complete_task","id":"id da tarefa (dos dados abaixo)"}
5. {"type":"add_event","event":{"title":"...","date":"YYYY-MM-DD","time":"HH:MM ou null","location":"... ou null"}}
6. {"type":"delete_item","collection":"meals|finances|tasks|events","id":"..."}

Regras:
- Se receber FOTO de comida: identifique cada alimento visível, estime a porção e os macros, e gere um add_meal. No reply, resuma o que identificou.
- Datas relativas ("ontem", "sexta") → converta para YYYY-MM-DD usando a data de hoje.
- Perguntas/relatórios ("quanto gastei", "resumo da semana", "quantas calorias comi"): responda no reply usando os dados abaixo, com números formatados em R$ e quebras de linha (\\n) quando ajudar. Sem actions.
- Se algo estiver ambíguo (valor sem contexto, por exemplo), pergunte no reply em vez de chutar.
- Pode registrar várias ações de uma vez ("gastei 50 no uber e 30 no almoço" → duas add_finance).
- Seja direto e caloroso, sem enrolação.

DADOS ATUAIS:
${JSON.stringify(dataSummary())}`;
}

async function callAI(userContent) {
  // Monta o histórico excluindo a mensagem atual (já vai em userContent)
  // e garantindo alternância user/assistant exigida pela API.
  const past = S.history.slice(0, -1).slice(-10);
  const messages = [];
  for (const h of past) {
    const role = h.role === 'assistant' ? 'assistant' : 'user';
    if (messages.length && messages[messages.length - 1].role === role) {
      messages[messages.length - 1].content += '\n' + h.text; // funde turnos consecutivos do mesmo papel
    } else {
      messages.push({ role, content: h.text });
    }
  }
  while (messages.length && messages[0].role === 'assistant') messages.shift(); // 1ª mensagem deve ser user
  if (messages.length && messages[messages.length - 1].role === 'user') {
    // último turno também era user (ex: falha anterior): funde com a mensagem atual
    const prev = messages.pop().content;
    if (typeof userContent === 'string') userContent = prev + '\n' + userContent;
    else userContent = [{ type: 'text', text: prev }, ...userContent];
  }
  messages.push({ role: 'user', content: userContent });
  const ctrl = new AbortController();
  const timeout = setTimeout(() => ctrl.abort(), 60000);
  let resp;
  try {
    resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt(),
        messages
      }),
      signal: ctrl.signal
    });
  } finally { clearTimeout(timeout); }
  const data = await resp.json().catch(() => null);
  if (!data) throw new Error('resposta inválida da API (HTTP ' + resp.status + ')');
  if (data.error) throw new Error(data.error.message || data.error.type || 'erro na API');
  const text = data.content.map(b => b.type === 'text' ? b.text : '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  const start = clean.indexOf('{');
  const end = clean.lastIndexOf('}');
  // fallback: se a IA não devolver JSON, trata o texto como resposta simples
  if (start === -1 || end === -1) return { reply: clean, actions: [] };
  try { return JSON.parse(clean.slice(start, end + 1)); }
  catch (e) { return { reply: clean, actions: [] }; }
}

/* ================= SEND ================= */
let inFlight = false;
async function send() {
  if (inFlight) return;
  const text = input.value.trim();
  if (!text && !pendingPhoto) return;
  inFlight = true;
  closeSlash();
  sendBtn.disabled = true;
  input.value = ''; input.style.height = 'auto';

  const photo = pendingPhoto;
  clearPhoto();
  addBubble('user', text || 'Analisa essa foto pra mim', photo ? photo.url : null);

  let userContent;
  if (photo) {
    userContent = [
      { type: 'image', source: { type: 'base64', media_type: photo.mediaType, data: photo.data } },
      { type: 'text', text: text || 'Foto de uma refeição. Identifique os alimentos, estime porções e macros, e registre.' }
    ];
    S.history.push({ role: 'user', text: (text ? text + ' ' : '') + '[enviei uma foto de comida]' });
  } else {
    userContent = text;
    S.history.push({ role: 'user', text });
  }

  const typing = addBubble('bot', 'pensando…');
  typing.classList.add('typing');

  try {
    const res = await callAI(userContent);
    typing.remove();
    const actions = res.actions || [];
    for (const a of actions) applyAction(a);
    if (res.reply) {
      addBubble('bot', res.reply);
      S.history.push({ role: 'assistant', text: res.reply });
    }
    if (S.history.length > 30) S.history = S.history.slice(-30);
    saveState('history');
  } catch (e) {
    typing.remove();
    let msg;
    if (e.name === 'AbortError') msg = '⏱ A resposta demorou demais e cancelei. Verifica a conexão e tenta de novo.';
    else if (/fetch|network|load failed/i.test(e.message)) msg = '📡 Não consegui alcançar a API. Isso acontece se o app estiver rodando fora do Claude (arquivo baixado ou hospedado) — o chat com IA só funciona com o app aberto aqui dentro do Claude.';
    else msg = '⚠ Erro: ' + e.message + '\n\nSe persistir, copia essa mensagem e cola na conversa com o Claude que eu corrijo.';
    addBubble('bot', msg);
  }
  inFlight = false;
  sendBtn.disabled = false;
  input.focus();
}

/* ================= ACTIONS ================= */
function applyAction(a) {
  try {
    if (a.type === 'add_meal' && a.meal) {
      const m = a.meal;
      const items = m.items || [];
      const sum = k => items.reduce((s, i) => s + (Number(i[k]) || 0), 0);
      const meal = {
        id: uid(), title: m.title || 'Refeição', meal_type: m.meal_type || 'lanche',
        date: m.date || todayStr(), items,
        kcal: Math.round(Number(m.kcal) || sum('kcal')),
        protein_g: Math.round((Number(m.protein_g) || sum('protein_g')) * 10) / 10,
        carbs_g: Math.round((Number(m.carbs_g) || sum('carbs_g')) * 10) / 10,
        fat_g: Math.round((Number(m.fat_g) || sum('fat_g')) * 10) / 10
      };
      S.meals.push(meal); saveState('meals');
      renderMealCard(meal);
    }
    else if (a.type === 'add_finance' && a.entry) {
      const e = a.entry;
      const entry = { id: uid(), kind: e.kind === 'receita' ? 'receita' : 'despesa', desc: e.desc || '—', amount: Math.abs(Number(e.amount) || 0), category: e.category || 'Outros', business: BIZ.includes(e.business) ? e.business : 'Pessoal', date: e.date || todayStr() };
      S.finances.push(entry); saveState('finances');
      renderFinanceCard(entry);
    }
    else if (a.type === 'add_task' && a.task) {
      const t = { id: uid(), title: a.task.title, due: a.task.due || null, done: false };
      S.tasks.push(t); saveState('tasks');
      renderTaskCard(t);
    }
    else if (a.type === 'complete_task' && a.id) {
      const t = S.tasks.find(x => x.id === a.id);
      if (t) { t.done = true; saveState('tasks'); }
    }
    else if (a.type === 'add_event' && a.event) {
      const ev = { id: uid(), title: a.event.title, date: a.event.date || todayStr(), time: a.event.time || null, location: a.event.location || null };
      S.events.push(ev); saveState('events');
      renderEventCard(ev);
    }
    else if (a.type === 'delete_item' && a.collection && a.id) {
      const col = { meals: 'meals', finances: 'finances', tasks: 'tasks', events: 'events' }[a.collection];
      if (col) { S[col] = S[col].filter(x => x.id !== a.id); saveState(col); }
    }
  } catch (e) { console.error('action fail', a, e); }
}

/* ---------- briefing matinal ---------- */
function showBriefing(text, loading) {
  const box = document.getElementById('briefingBox');
  box.innerHTML = `<div class="briefing"><div class="hc-head">
    <span class="hc-title" style="font-family:'Sora',sans-serif;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim)">☀️ Briefing do dia</span>
    ${loading ? '' : '<button class="refresh" onclick="generateBriefing(true)">atualizar ↻</button>'}
  </div>${text}</div>`;
}
async function generateBriefing(force) {
  const today = todayStr();
  const b = S.settings.briefing;
  const hasData = S.meals.length || S.finances.length || S.tasks.length || S.events.length;
  if (!hasData) { document.getElementById('briefingBox').innerHTML = ''; return; }
  if (!force && b.date === today && b.text) { showBriefing(esc(b.text)); return; }
  showBriefing('Preparando seu briefing…', true);
  try {
    const d = new Date();
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: `Você é o Farol, assistente pessoal do Claudio. Hoje é ${WEEK[d.getDay()]}, ${todayStr()}. Gere um briefing matinal em TEXTO PURO (sem JSON, sem markdown): 3 a 5 frases curtas e diretas cobrindo o que importa hoje — compromissos do dia, tarefas vencendo ou atrasadas, situação do mês nas finanças (saldo, orçamentos perto do limite) e, se houver dados de ontem, como foi a alimentação vs. metas. Tom caloroso e prático. Valores em R$.\n\nDADOS: ${JSON.stringify(dataSummary())}\nOntem: ${JSON.stringify(S.meals.filter(m => { const y = new Date(Date.now() - 864e5); return m.date === todayStr(y); }).map(m => ({ titulo: m.title, kcal: m.kcal, p: m.protein_g })))}`,
        messages: [{ role: 'user', content: 'Gere o briefing de hoje.' }]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content.map(x => x.type === 'text' ? x.text : '').join('').trim();
    S.settings.briefing = { date: today, text };
    saveState('settings');
    showBriefing(esc(text));
  } catch (e) {
    showBriefing('Não consegui gerar o briefing agora. <button class="refresh" onclick="generateBriefing(true)">tentar de novo ↻</button>', true);
  }
}

function goalBar(label, val, goal, unit) {
  const pct = Math.min(100, val / goal * 100);
  const cls = pct >= 100 ? 'over' : pct >= 85 ? 'warn' : '';
  return `<div class="goal-row"><div class="row"><span>${label}</span><span><b>${Math.round(val)}</b>/${goal}${unit}</span></div>
    <div class="goal-track"><div class="goal-fill ${cls}" style="width:${pct.toFixed(1)}%"></div></div></div>`;
}

function nowCardHTML() {
  const today = todayStr();
  const now = new Date();
  const evs = S.events.filter(e => {
    if (e.date > today) return true;
    if (e.date === today) {
      if (!e.time) return true;
      const [h, mi] = e.time.split(':').map(Number);
      const dt = new Date(); dt.setHours(h, mi, 0, 0);
      return dt >= now;
    }
    return false;
  }).sort((a, b) => (a.date + (a.time || '')).localeCompare(b.date + (b.time || '')));
  const ev = evs[0];
  if (!ev) return '';
  let when;
  if (ev.date === today && ev.time) {
    const [h, mi] = ev.time.split(':').map(Number);
    const diff = Math.round((new Date().setHours(h, mi, 0, 0) - now) / 60000);
    when = diff < 60 ? `em ${diff} min` : `em ${Math.floor(diff / 60)}h${diff % 60 ? String(diff % 60).padStart(2, '0') : ''}`;
  } else if (ev.date === today) {
    when = 'hoje';
  } else {
    const d = new Date(ev.date + 'T12:00:00');
    const tomorrow = todayStr(new Date(Date.now() + 864e5));
    when = (ev.date === tomorrow ? 'amanhã' : `${WEEK[d.getDay()].slice(0, 3)} ${fmtDate(ev.date)}`) + (ev.time ? ' · ' + ev.time : '');
  }
  return `<div class="now-card" onclick="showView('agenda')">
    <div class="hc-title" style="font-family:'Sora',sans-serif;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">⏰ Próximo compromisso</div>
    <div class="now-when">${when}</div>
    <div class="now-title">${esc(ev.title)}</div>
    ${ev.location ? `<div class="now-sub">${esc(ev.location)}</div>` : ''}
  </div>`;
}

function budgetAlerts(byCat) {
  const B = S.settings.budgets;
  const alerts = [];
  Object.entries(B).forEach(([cat, lim]) => {
    if (!lim) return;
    const v = byCat[cat] || 0;
    const pct = v / lim * 100;
    if (pct >= 100) alerts.push(`<div class="budget-alert over">⚠ ${cat} estourou o orçamento (${fmtBR(v)} de ${fmtBR(lim)})</div>`);
    else if (pct >= 80) alerts.push(`<div class="budget-alert">⚠ ${cat} já usou ${Math.round(pct)}% do orçamento</div>`);
  });
  return alerts.join('');
}

function shiftFinMonth(n) {
  let [y, m] = finMonth.split('-').map(Number);
  m += n; if (m < 1) { m = 12; y--; } if (m > 12) { m = 1; y++; }
  finMonth = `${y}-${String(m).padStart(2, '0')}`;
  renderFinance();
}
function renderFinance() {
  const [y, m] = finMonth.split('-');
  document.getElementById('finMonthLabel').textContent = `${MONTHS[Number(m)-1]} ${y}`;
  const entries = S.finances.filter(f => f.date && f.date.startsWith(finMonth)).sort((a,b) => b.date.localeCompare(a.date));
  const rec = entries.filter(e => e.kind === 'receita').reduce((s, e) => s + e.amount, 0);
  const desp = entries.filter(e => e.kind === 'despesa').reduce((s, e) => s + e.amount, 0);
  const saldo = rec - desp;
  document.getElementById('finStats').innerHTML = `
    <div class="stat"><div class="v" style="color:var(--leaf)">${fmtBR(rec)}</div><div class="l">receitas</div></div>
    <div class="stat"><div class="v" style="color:var(--clay)">${fmtBR(desp)}</div><div class="l">despesas</div></div>
    <div class="stat"><div class="v" style="color:${saldo >= 0 ? 'var(--leaf)' : 'var(--clay)'}">${fmtBR(saldo)}</div><div class="l">saldo</div></div>`;
  /* --- por negócio --- */
  const byBiz = {};
  entries.forEach(e => {
    const b = e.business || 'Pessoal';
    byBiz[b] = byBiz[b] || { r: 0, d: 0 };
    if (e.kind === 'receita') byBiz[b].r += e.amount; else byBiz[b].d += e.amount;
  });
  const bizEl = document.getElementById('finBiz');
  const bizList = Object.entries(byBiz).sort((a, b) => (b[1].r - b[1].d) - (a[1].r - a[1].d));
  bizEl.innerHTML = bizList.length ? '' : '<div class="empty" style="padding:12px">Sem movimentação neste mês.</div>';
  bizList.forEach(([name, v]) => {
    const res = v.r - v.d;
    const el = document.createElement('div');
    el.className = 'biz-row';
    el.innerHTML = `<div class="row"><b>${esc(name)}</b>
      <span class="biz-result" style="color:${res >= 0 ? 'var(--leaf)' : 'var(--clay)'}">${res >= 0 ? '+' : '−'}${fmtBR(Math.abs(res))}</span></div>
      <div class="sub"><span>receita ${fmtBR(v.r)}</span><span>custo ${fmtBR(v.d)}</span></div>`;
    bizEl.appendChild(el);
  });

  const byCat = {};
  entries.filter(e => e.kind === 'despesa').forEach(e => byCat[e.category] = (byCat[e.category] || 0) + e.amount);
  const max = Math.max(1, ...Object.values(byCat));
  const bars = document.getElementById('finBars');
  const cats = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
  bars.innerHTML = cats.length ? '' : '<div class="empty" style="padding:12px">Sem despesas neste mês.</div>';
  cats.forEach(([cat, v]) => {
    const lim = S.settings.budgets[cat];
    const el = document.createElement('div');
    el.className = 'bar-row';
    let fillColor = 'var(--ocean)', extra = '';
    if (lim) {
      const pct = v / lim * 100;
      fillColor = pct >= 100 ? 'var(--clay)' : pct >= 80 ? 'var(--sun)' : 'var(--ocean)';
      extra = ` <span style="color:var(--ink-dim);font-weight:400">/ ${fmtBR(lim)} (${Math.round(pct)}%)</span>`;
    }
    const width = lim ? Math.min(100, v / lim * 100) : v / max * 100;
    el.innerHTML = `<div class="row"><span>${esc(cat)}</span><b>${fmtBR(v)}${extra}</b></div>
      <div class="bar-track"><div class="bar-fill" style="width:${width.toFixed(1)}%;background:${fillColor}"></div></div>`;
    bars.appendChild(el);
  });
  const list = document.getElementById('finList');
  list.innerHTML = entries.length ? '' : '<div class="empty">Nenhum lançamento.<br>Diga no chat: "gastei 45 no uber".</div>';
  entries.forEach(e => {
    const pos = e.kind === 'receita';
    const el = document.createElement('div');
    el.className = 'list-item';
    el.innerHTML = `<div class="row"><div><b>${esc(e.desc)}</b><div class="sub">${esc(e.category)}${e.business && e.business !== 'Pessoal' ? ' · ' + esc(e.business) : ''} · ${fmtDate(e.date)}</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="amount ${pos ? 'pos' : 'neg'}" style="font-size:.9rem">${pos ? '+' : '−'}${fmtBR(e.amount)}</span>
        <button class="del-btn" onclick="delItem('finances','${e.id}')">✕</button></div></div>`;
    editable(el, 'finances', e.id);
    list.appendChild(el);
  });
}

function renderAgenda() {
  const list = document.getElementById('agendaList');
  const today = todayStr();
  const evs = S.events.filter(e => e.date >= today).sort((a, b) => (a.date + (a.time||'')).localeCompare(b.date + (b.time||'')));
  const past = S.events.filter(e => e.date < today);
  list.innerHTML = evs.length ? '' : '<div class="empty">Agenda livre.<br>Diga no chat: "marcar dentista terça às 14h".</div>';
  let lastDate = '';
  evs.forEach(ev => {
    if (ev.date !== lastDate) {
      lastDate = ev.date;
      const d = new Date(ev.date + 'T12:00:00');
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = ev.date === today ? 'Hoje' : `${WEEK[d.getDay()]}, ${fmtDate(ev.date)}`;
      list.appendChild(lbl);
    }
    const el = document.createElement('div');
    el.className = 'list-item';
    el.innerHTML = `<div class="row"><div><b>${esc(ev.title)}</b>
      <div class="sub">${ev.time || 'sem horário'}${ev.location ? ' · ' + esc(ev.location) : ''}</div></div>
      <button class="del-btn" onclick="delItem('events','${ev.id}')">✕</button></div>`;
    editable(el, 'events', ev.id);
    list.appendChild(el);
  });
  if (past.length) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Passados';
    list.appendChild(lbl);
    past.slice(-5).reverse().forEach(ev => {
      const el = document.createElement('div');
      el.className = 'list-item';
      el.style.opacity = '.55';
      el.innerHTML = `<div class="row"><div><b>${esc(ev.title)}</b><div class="sub">${fmtDate(ev.date)}${ev.time ? ' · ' + ev.time : ''}</div></div>
        <button class="del-btn" onclick="delItem('events','${ev.id}')">✕</button></div>`;
      list.appendChild(el);
    });
  }
}

function renderTasks() {
  const list = document.getElementById('taskList');
  const open = S.tasks.filter(t => !t.done);
  const done = S.tasks.filter(t => t.done);
  list.innerHTML = S.tasks.length ? '' : '<div class="empty">Nenhuma tarefa.<br>Diga no chat: "lembrar de enviar lista da portaria".</div>';
  const mk = (t) => {
    const el = document.createElement('div');
    el.className = 'list-item' + (t.done ? ' task-done' : '');
    el.innerHTML = `<div class="row" style="justify-content:flex-start">
      <button class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask('${t.id}')">✓</button>
      <div style="flex:1"><b class="t">${esc(t.title)}</b>${t.due ? `<div class="sub">prazo: ${fmtDate(t.due)}</div>` : ''}</div>
      <button class="del-btn" onclick="delItem('tasks','${t.id}')">✕</button></div>`;
    editable(el, 'tasks', t.id);
    return el;
  };
  if (open.length) {
    const lbl = document.createElement('div'); lbl.className = 'section-label'; lbl.textContent = 'A fazer';
    list.appendChild(lbl); open.forEach(t => list.appendChild(mk(t)));
  }
  if (done.length) {
    const lbl = document.createElement('div'); lbl.className = 'section-label'; lbl.textContent = 'Concluídas';
    list.appendChild(lbl); done.forEach(t => list.appendChild(mk(t)));
  }
}
function toggleTask(id) {
  const t = S.tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; saveState('tasks'); renderTasks(); }
}
const RERENDER = { meals: () => renderMeals(), finances: () => renderFinance(), tasks: () => renderTasks(), events: () => renderAgenda() };
function delItem(col, id) {
  const idx = S[col].findIndex(x => x.id === id);
  if (idx < 0) return;
  const item = S[col][idx];
  S[col].splice(idx, 1);
  saveState(col);
  RERENDER[col]();
  toast('Item removido', () => {
    S[col].splice(Math.min(idx, S[col].length), 0, item);
    saveState(col);
    RERENDER[col]();
  });
}

/* ================= EDIÇÃO POR TOQUE ================= */
const ALL_CATS = [...new Set([...EXP_CATS, 'Engenharia', 'Airbnb'])];
const EDIT_FIELDS = {
  finances: [
    { k: 'desc', l: 'Descrição', t: 'text' },
    { k: 'amount', l: 'Valor (R$)', t: 'number' },
    { k: 'kind', l: 'Tipo', t: 'select', opts: ['despesa', 'receita'] },
    { k: 'category', l: 'Categoria', t: 'select', opts: ALL_CATS },
    { k: 'business', l: 'Negócio', t: 'select', opts: BIZ },
    { k: 'date', l: 'Data', t: 'date' }
  ],
  meals: [
    { k: 'title', l: 'Refeição', t: 'text' },
    { k: 'kcal', l: 'Calorias', t: 'number' },
    { k: 'protein_g', l: 'Proteína (g)', t: 'number' },
    { k: 'carbs_g', l: 'Carbo (g)', t: 'number' },
    { k: 'fat_g', l: 'Gordura (g)', t: 'number' },
    { k: 'date', l: 'Data', t: 'date' }
  ],
  tasks: [
    { k: 'title', l: 'Tarefa', t: 'text' },
    { k: 'due', l: 'Prazo', t: 'date' }
  ],
  events: [
    { k: 'title', l: 'Compromisso', t: 'text' },
    { k: 'date', l: 'Data', t: 'date' },
    { k: 'time', l: 'Hora', t: 'time' },
    { k: 'location', l: 'Local', t: 'text' }
  ]
};
let editing = null;
function openEdit(col, id) {
  const item = S[col].find(x => x.id === id);
  if (!item) return;
  editing = { col, id };
  const sheet = document.getElementById('modalSheet');
  sheet.innerHTML = `<h3>✎ Editar</h3>` +
    EDIT_FIELDS[col].map(f => {
      const v = item[f.k] == null ? '' : item[f.k];
      if (f.t === 'select')
        return `<div class="set-field"><label>${f.l}</label><select data-edit="${f.k}">${f.opts.map(o => `<option${o === v ? ' selected' : ''}>${o}</option>`).join('')}</select></div>`;
      return `<div class="set-field"><label>${f.l}</label><input type="${f.t}" data-edit="${f.k}" value="${esc(v)}"></div>`;
    }).join('') +
    `<div class="btn-row" style="margin-top:14px">
      <button class="btn" onclick="saveEdit()">Salvar</button>
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn ghost" style="margin-left:auto;color:var(--clay)" onclick="closeModal();delItem('${col}','${id}')">Excluir</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}
function saveEdit() {
  if (!editing) return;
  const { col, id } = editing;
  const item = S[col].find(x => x.id === id);
  if (item) {
    document.querySelectorAll('[data-edit]').forEach(inp => {
      const k = inp.dataset.edit;
      let v = inp.value;
      if (inp.type === 'number') v = parseFloat(v) || 0;
      if (v === '') v = null;
      item[k] = v;
    });
    if (col === 'finances') item.amount = Math.abs(item.amount || 0);
    saveState(col);
    RERENDER[col]();
    toast('Alterações salvas');
  }
  closeModal();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editing = null;
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') closeModal();
});
function editable(el, col, id) {
  el.style.cursor = 'pointer';
  el.addEventListener('click', ev => {
    if (ev.target.closest('button')) return;
    openEdit(col, id);
  });
}

/* ================= AJUSTES ================= */
function renderSettings() {
  const G = S.settings.goals, B = S.settings.budgets, C = S.settings.supabase;
  const body = document.getElementById('settingsBody');
  body.innerHTML = `
    <div class="set-group">
      <h3>🥗 Metas diárias de macros</h3>
      <div class="set-field"><label>Calorias (kcal)</label><input type="number" id="g_kcal" value="${G.kcal || ''}" placeholder="ex: 2200"></div>
      <div class="set-field"><label>Proteína (g)</label><input type="number" id="g_protein" value="${G.protein || ''}" placeholder="ex: 150"></div>
      <div class="set-field"><label>Carboidrato (g)</label><input type="number" id="g_carbs" value="${G.carbs || ''}" placeholder="opcional"></div>
      <div class="set-field"><label>Gordura (g)</label><input type="number" id="g_fat" value="${G.fat || ''}" placeholder="opcional"></div>
    </div>
    <div class="set-group">
      <h3>💸 Orçamento mensal por categoria (R$)</h3>
      ${EXP_CATS.map(c => `<div class="set-field"><label>${c}</label><input type="number" data-budget="${c}" value="${B[c] || ''}" placeholder="sem teto"></div>`).join('')}
    </div>
    <div class="set-group">
      <h3>☁️ Sincronização Supabase</h3>
      <div class="set-col"><label>URL do projeto</label><input class="wide" type="text" id="sb_url" value="${C.url || ''}" placeholder="https://xxxx.supabase.co"></div>
      <div class="set-col"><label>Anon key</label><input class="wide" type="password" id="sb_key" value="${C.key || ''}" placeholder="eyJ..."></div>
      <div class="btn-row">
        <button class="btn ghost" onclick="supaPush(true)">Enviar agora ↑</button>
        <button class="btn ghost" onclick="supaPull(true)">Baixar da nuvem ↓</button>
      </div>
      <div class="sync-status" id="syncStatus">${C.url ? 'Configurado — sync automático após alterações.' : 'Não configurado.'}</div>
      <details><summary>SQL para criar a tabela (rodar uma vez no SQL Editor)</summary>
        <pre>create table farol (
  id text primary key,
  data jsonb,
  updated_at timestamptz default now()
);
alter table farol enable row level security;
create policy "farol_anon" on farol
  for all using (true) with check (true);</pre>
        Atenção: essa policy libera leitura/escrita pela anon key — mesmo padrão do seu dashboard de aluguel. Não guarde nada sigiloso.
      </details>
      <details><summary>Onde o sync funciona</summary>
        Rodando aqui dentro do Claude, requisições externas podem ser bloqueadas pelo navegador — se o "Enviar agora" falhar, hospede o arquivo no GitHub Pages (como o dashboard_aluguel) para o sync funcionar; lá, porém, o chat com IA não funciona sem chave própria. Os dados locais continuam salvos aqui de qualquer forma.
      </details>
    </div>
    <div class="btn-row" style="margin-bottom:20px">
      <button class="btn" onclick="saveSettings()">Salvar ajustes</button>
      <button class="btn ghost" onclick="showView('home')">Voltar</button>
    </div>`;
}
function saveSettings() {
  const num = id => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) || v <= 0 ? null : v; };
  S.settings.goals = { kcal: num('g_kcal'), protein: num('g_protein'), carbs: num('g_carbs'), fat: num('g_fat') };
  const budgets = {};
  document.querySelectorAll('[data-budget]').forEach(inp => {
    const v = parseFloat(inp.value);
    if (!isNaN(v) && v > 0) budgets[inp.dataset.budget] = v;
  });
  S.settings.budgets = budgets;
  S.settings.supabase = { url: document.getElementById('sb_url').value.trim().replace(/\/$/, ''), key: document.getElementById('sb_key').value.trim() };
  saveState('settings');
  showView('home');
}

/* ================= SUPABASE SYNC ================= */
let syncTimer = null;
function scheduleSync() {
  const c = S.settings && S.settings.supabase;
  if (!c || !c.url || !c.key) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => supaPush(false), 4000);
}
function setSyncStatus(msg) {
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = msg;
}
function sbHeaders(c) {
  return { apikey: c.key, Authorization: 'Bearer ' + c.key, 'Content-Type': 'application/json' };
}
async function supaPush(manual) {
  const c = S.settings.supabase;
  if (!c.url || !c.key) { if (manual) setSyncStatus('Configure URL e anon key primeiro.'); return; }
  try {
    const r = await fetch(c.url + '/rest/v1/farol', {
      method: 'POST',
      headers: Object.assign(sbHeaders(c), { Prefer: 'resolution=merge-duplicates' }),
      body: JSON.stringify({
        id: 'principal',
        data: { meals: S.meals, finances: S.finances, tasks: S.tasks, events: S.events, settings: { goals: S.settings.goals, budgets: S.settings.budgets }, ts: Date.now() },
        updated_at: new Date().toISOString()
      })
    });
    setSyncStatus(r.ok ? '✓ Enviado à nuvem ' + new Date().toLocaleTimeString('pt-BR') : 'Erro no envio (' + r.status + ') — confira a tabela e a policy.');
  } catch (e) {
    setSyncStatus('Sem conexão com o Supabase (bloqueio de rede ou URL errada).');
  }
}
async function supaPull(manual) {
  const c = S.settings.supabase;
  if (!c.url || !c.key) { if (manual) setSyncStatus('Configure URL e anon key primeiro.'); return; }
  try {
    const r = await fetch(c.url + '/rest/v1/farol?id=eq.principal&select=data', { headers: sbHeaders(c) });
    const rows = await r.json();
    if (rows && rows[0] && rows[0].data) {
      const d = rows[0].data;
      ['meals', 'finances', 'tasks', 'events'].forEach(k => { if (Array.isArray(d[k])) S[k] = d[k]; });
      if (d.settings) {
        if (d.settings.goals) S.settings.goals = Object.assign({}, S.settings.goals, d.settings.goals);
        if (d.settings.budgets) S.settings.budgets = d.settings.budgets;
      }
      for (const k of ['meals', 'finances', 'tasks', 'events', 'settings']) await saveState(k);
      setSyncStatus('✓ Dados baixados da nuvem.');
      if (manual) showView('home');
    } else if (manual) setSyncStatus('Nada encontrado na nuvem ainda.');
  } catch (e) {
    if (manual) setSyncStatus('Sem conexão com o Supabase (bloqueio de rede ou URL errada).');
  }
}

/* ================= INIT ================= */
(async function init() {
  const d = new Date();
  document.getElementById('headerDate').textContent = `${WEEK[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]}`;
  await loadState();
  if (!storageOK) document.getElementById('storageWarn').style.display = 'block';
  else persistAll(0); // consolida na chave única (inclusive dados migrados do formato antigo)
  const localEmpty = !S.meals.length && !S.finances.length && !S.tasks.length && !S.events.length;
  if (localEmpty && S.settings.supabase.url && S.settings.supabase.key) await supaPull(false);
  renderWelcome();
  // reidrata as últimas mensagens do histórico
  S.history.slice(-8).forEach(h => addBubble(h.role === 'user' ? 'user' : 'bot', h.text));
  showView('home');
})();
</script>
